name: CI Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python: lint + type-check + test + coverage + CVE scan ───────────
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --quiet --root-user-action=ignore

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy backend/ deerflow/ --ignore-missing-imports

      - name: Pytest + coverage (≥50 % required)
        run: |
          pytest backend/tests/ deerflow/tests/ \
            --ignore=backend/tests/test_scheduler_routes.py \
            -o "addopts=" \
            -x --tb=short -q \
            --cov=backend --cov=deerflow \
            --cov-report=term-missing \
            --cov-fail-under=58

      - name: pip-audit — dependency CVE scan
        run: |
          pip install --upgrade pip --quiet --root-user-action=ignore
          pip install pip-audit --quiet --root-user-action=ignore
          pip-audit --skip-editable

  # ── Frontend: lint + typecheck + build + CVE scan ────────────────────
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: npm audit — dependency CVE scan
        run: cd frontend && npm audit --audit-level=critical --production

      - name: ESLint
        run: cd frontend && npm run lint

      - name: TypeScript — type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

  # ── Secret scanning ───────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history — scan all commits in the push

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanning tools
        run: pip install detect-secrets --quiet --root-user-action=ignore

      - name: Detect secrets (detect-secrets baseline)
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files '\.actrc$' \
            --exclude-files '\.secrets\.baseline$' \
            --exclude-files 'node_modules/' \
            --exclude-files '\.next/' \
            > /tmp/new-baseline.json
          detect-secrets audit /tmp/new-baseline.json --report --json | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              for fpath, secrets in results.items():
                  for s in secrets:
                      print(f'  SECRET: {fpath}:{s.get(\"line_number\",\"?\")} [{s.get(\"type\",\"unknown\")}]')
              print(f'FAIL: {total} potential secret(s) detected')
              sys.exit(1)
          print('OK: no secrets detected')
          "

      - name: Custom network credential scan
        run: |
          python3 scripts/scan_secrets.py
          echo "OK: custom secret patterns clean"
