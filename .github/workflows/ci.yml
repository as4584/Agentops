name: CI Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Python: lint + type-check + test + coverage + CVE scan ───────────
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]" --quiet --root-user-action=ignore

      - name: Config validation — operator-only contract
        run: python -m backend.config validate

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy backend/ deerflow/ --ignore-missing-imports

      - name: Pytest + coverage (≥50 % required)
        run: |
          pytest backend/tests/ deerflow/tests/ \
            --ignore=backend/tests/test_scheduler_routes.py \
            -o "addopts=" \
            -x --tb=short -q \
            --cov=backend --cov=deerflow \
            --cov-report=term-missing \
            --cov-fail-under=58

      - name: pip-audit — dependency CVE scan
        run: |
          pip install --upgrade pip --quiet --root-user-action=ignore
          pip install pip-audit --quiet --root-user-action=ignore
          pip-audit --skip-editable

  # ── Secret scanning ───────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history — scan all commits in the push

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanning tools
        run: pip install detect-secrets --quiet --root-user-action=ignore

      - name: Detect secrets (detect-secrets — informational)
        run: |
          detect-secrets scan \
            --exclude-files '\.env\.example$' \
            --exclude-files '\.actrc$' \
            --exclude-files '\.secrets\.baseline$' \
            --exclude-files 'node_modules/' \
            --exclude-files '\.next/' \
            --exclude-files 'tsconfig\.tsbuildinfo$' \
            --exclude-files '\.jsonl$' \
            --exclude-files 'scan_secrets\.py$' \
            > /tmp/new-baseline.json
          python3 -c "
          import json
          with open('/tmp/new-baseline.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          total = sum(len(v) for v in results.values())
          if total > 0:
              print(f'INFO: detect-secrets flagged {total} item(s) — review manually')
              for fpath, secrets in list(results.items())[:10]:
                  for s in secrets[:3]:
                      print(f'  {fpath}:{s.get(\"line_number\",\"?\")} [{s.get(\"type\",\"unknown\")}]')
              if total > 30:
                  print(f'  ... and {total - 30} more (mostly high-entropy false positives)')
          else:
              print('OK: detect-secrets found 0 secrets')
          " || true

      - name: Custom network credential scan
        run: |
          python3 scripts/scan_secrets.py
          echo "OK: custom secret patterns clean"
