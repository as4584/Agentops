name: Playwright E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Start mock backend
        run: |
          node -e "
          const http = require('http');
          const routes = {
            '/health': {status:'ok',llm_available:false,uptime_seconds:0,version:'ci-mock'},
            '/agents': [],
            '/tools': [],
            '/drift': {violations:[],drift_score:0,last_updated:null},
          };
          http.createServer((req, res) => {
            const url = req.url.split('?')[0];
            if (req.method === 'OPTIONS') {
              res.writeHead(204, {'Access-Control-Allow-Origin':'*','Access-Control-Allow-Methods':'GET,POST,OPTIONS','Access-Control-Allow-Headers':'Content-Type'});
              return res.end();
            }
            const body = routes[url] ?? (url.startsWith('/logs') ? [] : url.startsWith('/memory') ? {agents:[],total_size_bytes:0,total_size_mb:0} : url.startsWith('/soul/goals') ? {goals:[],count:0} : {});
            res.writeHead(200, {'Content-Type':'application/json','Access-Control-Allow-Origin':'*'});
            res.end(JSON.stringify(body));
          }).listen(8000, () => console.log('Mock backend listening on :8000'));
          " &
          sleep 1
      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run Playwright tests (blocking)
        run: cd frontend && npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/playwright-report
