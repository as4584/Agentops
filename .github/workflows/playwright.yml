name: Playwright E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Start mock backend
        run: node scripts/ci-mock-backend.js &
      - name: Wait for mock backend
        run: cd frontend && npx wait-on http://127.0.0.1:8000/health --timeout 10000
      - name: Start frontend
        run: cd frontend && npm run dev &
      - name: Wait for frontend
        run: cd frontend && npx wait-on http://127.0.0.1:3007 --timeout 60000
      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run Playwright tests (blocking)
        run: cd frontend && npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/playwright/playwright-report
